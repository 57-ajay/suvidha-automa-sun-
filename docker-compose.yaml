services:
  api:
    build: ./edge
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL}
    volumes:
      - ./edge/service-account.json:/app/service-account.json:ro
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
